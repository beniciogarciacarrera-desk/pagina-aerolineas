<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selector de Estrellas Puro CSS</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f5f6fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .tarjeta {
            background-color: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h2 { color: #2c3e50; margin-bottom: 5px; }
        p { color: #7f8c8d; margin-bottom: 25px; }

        /* --- AQUÍ ESTÁ EL TRUCO DE LAS ESTRELLAS --- */
        .contenedor-estrellas {
            display: flex;
            flex-direction: row-reverse; /* Voltea las estrellas para que el CSS pinte las anteriores */
            justify-content: center;
            gap: 8px;
        }

        /* Ocultamos COMPLETAMENTE los círculos de los inputs */
        .contenedor-estrellas input {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        /* Estilo de las estrellas (Gris por defecto cuando no están seleccionadas) */
        .contenedor-estrellas label {
            font-size: 50px;
            color: #dcdde1; /* Gris claro */
            cursor: pointer;
            transition: color 0.2s ease, transform 0.1s;
        }

        /* 1. Cuando pasas el mouse por encima: Ilumina esa estrella y todas las anteriores (1, 2, 3...) */
        .contenedor-estrellas label:hover,
        .contenedor-estrellas label:hover ~ label {
            color: #f1c40f; /* Dorado */
            transform: scale(1.1);
        }

        /* 2. Cuando haces CLIC: Mantiene dorada la estrella seleccionada y todas las anteriores */
        .contenedor-estrellas input:checked ~ label {
            color: #f1c40f; /* Dorado fijo */
        }


        /* --- SECCIÓN DE MENSAJES (OPCIONAL) --- */
        .mensaje {
            display: none;
            margin-top: 30px;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            background-color: #ecf0f1;
            color: #34495e;
        }

        /* Muestra el mensaje correcto según el clic */
        #star1:checked ~ .msg-1,
        #star2:checked ~ .msg-2,
        #star3:checked ~ .msg-3,
        #star4:checked ~ .msg-4,
        #star5:checked ~ .msg-5 {
            display: block;
        }
    </style>
</head>
<body>

<div class="tarjeta">
    <h2>Categoría de tu Hotel</h2>
    <p>Haz clic en la cantidad de estrellas que deseas:</p>

    <div class="contenedor-estrellas">
        
        <input type="radio" id="star5" name="estrellas">
        <label for="star5">★</label>

        <input type="radio" id="star4" name="estrellas">
        <label for="star4">★</label>

        <input type="radio" id="star3" name="estrellas">
        <label for="star3">★</label>

        <input type="radio" id="star2" name="estrellas">
        <label for="star2">★</label>

        <input type="radio" id="star1" name="estrellas">
        <label for="star1">★</label>

        <div class="mensaje msg-1">Seleccionaste: 1 Estrella ⭐</div>
        <div class="mensaje msg-2">Seleccionaste: 2 Estrellas ⭐⭐</div>
        <div class="mensaje msg-3">Seleccionaste: 3 Estrellas ⭐⭐⭐</div>
        <div class="mensaje msg-4">Seleccionaste: 4 Estrellas ⭐⭐⭐⭐</div>
        <div class="mensaje msg-5">Seleccionaste: 5 Estrellas ⭐⭐⭐⭐⭐</div>

    </div>
</div>

</body>
</html>
